name: Amazon Athena
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
specificationVersion: '0.19'
description: >-
  Amazon Athena is an interactive analytics service that makes it simple to
  analyze data directly in Amazon S3 using standard SQL. Athena is serverless,
  so there is no infrastructure to manage, and you pay only for the queries
  that you run.
created: '2024-01-15'
